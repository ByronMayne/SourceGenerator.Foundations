name: Publish
on: 
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:  {}
  
env:
  Configuration: Release
  ProjectDir: src\SourceGenerator.Foundations\
  ProjectName: SourceGenerator.Foundations.csproj
  SolutionPath: src\SourceGenerator.Foundations.sln
jobs:
  build:
    name: Build | All
    runs-on: windows-latest
    steps: 
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - name: Build Solution
        run: dotnet test src\SourceGenerator.Foundations.sln

  test: 
    name: Test | ${{ matrix.project.name }}
    runs-on: windows-latest
    needs: build
    strategy:
      matrix:
        project: 
          - name: SourceGenerator.Foundations.Tests
          - name: ConsoleApp.SourceGenerator.Tests
            path: Sandbox/
    steps: 
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - name: Test | ${{ matrix.project.name }}
        run: dotnet test src\${{ matrix.project.path }}${{ matrix.project.name }}\${{ matrix.project.name }}.csproj

  publish:
    name: Publish | ${{ matrix.project.name }}
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    needs: 
      - test
    strategy:
      matrix:
        project: 
            - name: SourceGenerator.Foundations
            - name: SourceGenerator.Foundations.Contracts
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0                # fetch the whole repo history
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - name: Restore
        run: dotnet tool restore 
      - name: GitVersion
        run: dotnet gitversion /output buildserver

      - name: Set prerelease package version (main)
        if: github.ref == 'refs/heads/main'
        run: echo "PACKAGE_VERSION=$env:GitVersion_NuGetVersionV2" >> $env:GITHUB_ENV

      - name: Set release package version (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "PACKAGE_VERSION=$env:GitVersion_MajorMinorPatch" >> $env:GITHUB_ENV

      # Build
      - name: Build | ${{ matrix.project.name }}
        run: dotnet build src\SourceGenerator.Foundations\SourceGenerator.Foundations.csproj -p:Version=$env:GitVersion_AssemblySemVer -p:PackageVersion=$env:PACKAGE_VERSION 
      # Pack 
      - name: Pack | ${{ matrix.project.name }}
        run: dotnet pack src\${{ matrix.project.name }}\${{ matrix.project.name }}.csproj -p:Version=$env:GitVersion_AssemblySemVer -p:PackageVersion=$env:PACKAGE_VERSION 
      
    # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} 
    
        # Release 
      - name: Push | ${{ matrix.project.name }}
        if: github.event_name == 'push'
        run: dotnet nuget push src\${{ matrix.project.name }}\bin\${{env.Configuration}}\*.nupkg --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
